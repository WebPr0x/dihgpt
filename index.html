<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dihGPT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { 
            background-color: #212121; 
            color: #ECECEC; 
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; 
            transition: background-color 0.5s ease;
        }
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #424242; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #4f4f4f; }

        /* --- STUDIO MODE THEME OVERRIDES --- */
        body.studio-mode { background-color: #050505 !important; }
        body.studio-mode #sidebar { background-color: #020202 !important; border-right-color: #1a1a1a !important; }
        body.studio-mode #main-header { background-color: transparent !important; }
        body.studio-mode #input-area-wrapper { background: linear-gradient(to top, #050505 70%, transparent) !important; }
        body.studio-mode #studio-bg-effects { opacity: 1; }
    </style>
</head>
<body class="flex h-screen overflow-hidden selection:bg-gray-700">
    
    <!-- Sidebar -->
    <aside id="sidebar" class="bg-[#171717] w-64 h-full flex flex-col absolute md:relative z-30 transform -translate-x-full md:translate-x-0 transition-all duration-500 border-r border-[#383838]">
        <div class="p-4 flex items-center justify-between">
            <button class="flex items-center gap-2 hover:bg-[#2f2f2f] p-2 rounded-lg transition-colors w-full">
                <div class="w-7 h-7 bg-white rounded-full flex items-center justify-center">
                    <i data-lucide="brain" class="w-4 h-4 text-black"></i>
                </div>
                <span class="font-medium">New chat</span>
                <i data-lucide="edit" class="w-4 h-4 ml-auto text-gray-400"></i>
            </button>
            <button id="close-sidebar-btn" class="md:hidden text-gray-400 hover:text-white p-2">
                <i data-lucide="x" class="w-5 h-5"></i>
            </button>
        </div>
        <div class="flex-1 overflow-y-auto p-3 space-y-4">
            <!-- Past chats cleared -->
        </div>
        <div class="p-4 border-t border-white/5">
            <button class="flex items-center gap-3 hover:bg-[#2f2f2f] p-2 rounded-lg transition-colors w-full text-sm">
                <i data-lucide="user" class="w-5 h-5 text-gray-400"></i>
                <span>Guest User</span>
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col h-full relative z-10">
        
        <!-- Studio Background Effects (Fades in during Studio Mode) -->
        <div id="studio-bg-effects" class="absolute inset-0 pointer-events-none opacity-0 transition-opacity duration-700 z-0">
            <!-- Creator Grid Pattern -->
            <div class="absolute inset-0 bg-[linear-gradient(to_right,#ffffff08_1px,transparent_1px),linear-gradient(to_bottom,#ffffff08_1px,transparent_1px)] bg-[size:32px_32px]"></div>
            <!-- Top Ambient Glow -->
            <div class="absolute top-0 left-1/2 -translate-x-1/2 w-[800px] h-[500px] bg-indigo-600/10 blur-[150px] rounded-full"></div>
        </div>

        <!-- Header -->
        <header id="main-header" class="h-14 flex items-center justify-between px-4 sticky top-0 bg-[#212121] z-20 transition-colors duration-500">
            <div class="flex items-center gap-2">
                <button id="open-sidebar-btn" class="text-gray-400 hover:text-white p-2 md:hidden">
                    <i data-lucide="menu" class="w-5 h-5"></i>
                </button>
                <button id="exit-studio-btn" class="hidden text-gray-400 hover:text-white p-2 flex items-center gap-2 text-sm font-medium transition-colors bg-white/5 hover:bg-white/10 rounded-full px-4">
                    <i data-lucide="arrow-left" class="w-4 h-4"></i> Back
                </button>
            </div>
            
            <!-- Standard Mode Tabs -->
            <div id="main-tabs" class="flex items-center justify-center gap-1 bg-white/5 backdrop-blur-md rounded-lg p-1 mx-auto border border-white/10">
                <button onclick="setMode('text')" class="mode-tab bg-[#2f2f2f] text-white px-3 py-1.5 rounded-md text-sm font-medium transition-colors" data-mode="text">Chat</button>
                <button onclick="setMode('image')" class="mode-tab bg-transparent text-gray-400 hover:text-gray-200 px-3 py-1.5 rounded-md text-sm font-medium transition-colors" data-mode="image">Image</button>
            </div>

            <!-- Studio Mode Tabs (Hidden by default) -->
            <div id="studio-tabs" class="hidden items-center justify-center gap-1 bg-white/5 backdrop-blur-md rounded-lg p-1 mx-auto border border-white/10 shadow-lg">
                <button onclick="setMode('audio')" class="mode-tab bg-transparent text-gray-400 hover:text-gray-200 px-3 py-1.5 rounded-md text-sm font-medium transition-colors" data-mode="audio">Audio</button>
                <button onclick="setMode('video')" class="mode-tab bg-transparent text-gray-400 hover:text-gray-200 px-3 py-1.5 rounded-md text-sm font-medium transition-colors" data-mode="video">Video</button>
            </div>

            <div class="w-9 h-9 flex items-center justify-center">
                <!-- Spacer for perfect centering -->
            </div>
        </header>

        <!-- Chat Area -->
        <div id="chat-container" class="flex-1 overflow-y-auto relative z-10">
            <div id="welcome-screen" class="h-full flex flex-col items-center justify-center p-4">
                <div class="text-center">
                    <div class="w-12 h-12 bg-white rounded-full mx-auto mb-4 flex items-center justify-center">
                        <i data-lucide="brain" class="w-6 h-6 text-black"></i>
                    </div>
                    <h1 class="text-2xl font-semibold mb-2">How can I help you today?</h1>
                    <p class="text-gray-400 text-sm mb-8">This model utilizes deep thinking processes before responding.</p>
                </div>
                
                <!-- Welcome Cards (Update Dynamically) -->
                <div id="welcome-cards" class="grid grid-cols-1 md:grid-cols-2 gap-3 max-w-2xl mx-auto w-full">
                    <button class="border border-[#383838] hover:bg-[#2f2f2f] rounded-xl p-4 text-left transition-colors text-sm flex flex-col gap-1" onclick="setInput('Write a Python script for a classic snake game')">
                        <span class="font-medium text-gray-200">Write a Python script</span>
                        <span class="text-gray-500">for a classic snake game</span>
                    </button>
                    <button class="border border-[#383838] hover:bg-[#2f2f2f] rounded-xl p-4 text-left transition-colors text-sm flex flex-col gap-1" onclick="setInput('Explain string theory to a 5 year old')">
                        <span class="font-medium text-gray-200">Explain string theory</span>
                        <span class="text-gray-500">to a 5 year old</span>
                    </button>
                </div>

                <!-- Call to Action for Audio/Video Section -->
                <div id="studio-cta" class="mt-10 flex justify-center w-full max-w-2xl mx-auto animate-in fade-in duration-500">
                    <button onclick="enterStudioMode()" class="flex items-center gap-2 px-6 py-3 rounded-full bg-gradient-to-r from-indigo-500/10 to-purple-500/10 hover:from-indigo-500/20 hover:to-purple-500/20 border border-indigo-500/20 hover:border-indigo-500/40 text-indigo-300 transition-all font-medium text-sm w-full md:w-auto justify-center hover:scale-[1.02] active:scale-[0.98]">
                        <i data-lucide="sparkles" class="w-4 h-4"></i>
                        Try song and video generation now
                    </button>
                </div>
            </div>

            <!-- Messages Stream -->
            <div id="messages" class="max-w-3xl mx-auto px-4 flex flex-col gap-6 py-6 hidden pb-8">
                <!-- Chat Bubbles go here -->
            </div>
        </div>

        <!-- NEW MEDIA SECTION: Redesigned Studio Player -->
        <div id="media-container" class="flex-1 overflow-y-auto hidden flex flex-col items-center justify-center p-4 sm:p-8 animate-in zoom-in-95 duration-500 relative z-20">
            <!-- Glassmorphism Player Card -->
            <div class="w-full max-w-3xl bg-white/[0.03] backdrop-blur-2xl border border-white/10 rounded-[2rem] overflow-hidden shadow-2xl flex flex-col relative z-10">
                
                <!-- Top Toolbar -->
                <div class="flex items-center justify-between p-4 sm:px-6 border-b border-white/5 bg-black/20">
                    <button id="back-to-chat-btn" class="text-gray-400 hover:text-white flex items-center gap-2 text-sm font-medium transition-colors rounded-full hover:bg-white/5 pr-4 py-1.5 -ml-2">
                        <div class="w-8 h-8 rounded-full flex items-center justify-center"><i data-lucide="arrow-left" class="w-4 h-4"></i></div>
                        Back to Chat
                    </button>
                    <div class="flex gap-2">
                        <button class="w-9 h-9 rounded-full bg-white/5 flex items-center justify-center text-gray-400 hover:text-white hover:bg-white/10 transition-colors" title="Download"><i data-lucide="download" class="w-4 h-4"></i></button>
                        <button class="w-9 h-9 rounded-full bg-white/5 flex items-center justify-center text-gray-400 hover:text-white hover:bg-white/10 transition-colors" title="Share"><i data-lucide="share-2" class="w-4 h-4"></i></button>
                    </div>
                </div>

                <!-- Main Display Area -->
                <div class="p-6 sm:p-10 flex flex-col items-center">
                    
                    <!-- Dynamic Media Screen -->
                    <div id="media-icon-container" class="w-full aspect-video bg-black/50 rounded-2xl flex flex-col items-center justify-center mb-8 shadow-inner border border-white/5 relative overflow-hidden group">
                        <div id="media-icon" class="z-10 flex flex-col items-center"></div>
                        <!-- Background Effects injected via JS -->
                        <div id="media-visualizer" class="absolute inset-0 flex items-end justify-center gap-[2px] px-8 pb-4 opacity-30 pointer-events-none"></div>
                    </div>
                    
                    <h2 id="media-title" class="text-2xl sm:text-4xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-white to-gray-400 mb-8 text-center line-clamp-2 leading-tight tracking-tight">
                        Title Goes Here
                    </h2>
                    
                    <!-- Premium Playback Controls -->
                    <div class="w-full flex flex-col gap-6 max-w-xl">
                        <!-- Scrub Bar -->
                        <div class="flex items-center gap-4">
                            <span class="text-xs text-gray-500 font-mono w-10 text-right">0:00</span>
                            <div class="h-2 w-full bg-white/10 rounded-full overflow-hidden relative cursor-pointer group/scrub">
                                <div class="absolute top-0 left-0 h-full w-1/3 bg-gradient-to-r from-indigo-500 to-purple-500 rounded-full"></div>
                            </div>
                            <span class="text-xs text-gray-500 font-mono w-10">-3:45</span>
                        </div>
                        
                        <!-- Buttons -->
                        <div class="flex items-center justify-center gap-6 sm:gap-10">
                            <button class="text-gray-600 hover:text-gray-300 transition-colors hidden sm:block"><i data-lucide="shuffle" class="w-5 h-5"></i></button>
                            <button class="text-gray-400 hover:text-white transition-colors"><i data-lucide="skip-back" class="w-6 h-6 sm:w-8 sm:h-8 fill-current"></i></button>
                            
                            <button class="w-16 h-16 sm:w-20 sm:h-20 bg-white text-black rounded-full flex items-center justify-center hover:scale-105 active:scale-95 transition-all shadow-[0_0_30px_rgba(255,255,255,0.15)]">
                                <i data-lucide="play" class="w-6 h-6 sm:w-8 sm:h-8 ml-1 sm:ml-1.5 fill-current"></i>
                            </button>
                            
                            <button class="text-gray-400 hover:text-white transition-colors"><i data-lucide="skip-forward" class="w-6 h-6 sm:w-8 sm:h-8 fill-current"></i></button>
                            <button class="text-gray-600 hover:text-gray-300 transition-colors hidden sm:block"><i data-lucide="repeat" class="w-5 h-5"></i></button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Input Area -->
        <div id="input-area-wrapper" class="p-4 bg-gradient-to-t from-[#212121] via-[#212121] to-transparent relative z-20 transition-all duration-500">
            <div class="max-w-3xl mx-auto relative group">
                <div class="relative flex items-end bg-[#2f2f2f] border border-[#383838] rounded-2xl overflow-hidden focus-within:ring-1 focus-within:ring-gray-400 transition-all shadow-lg">
                    <button class="p-3.5 text-gray-400 hover:text-white transition-colors">
                        <i data-lucide="paperclip" class="w-5 h-5"></i>
                    </button>
                    
                    <textarea 
                        id="user-input"
                        rows="1"
                        class="w-full bg-transparent py-3.5 px-2 outline-none text-gray-100 text-[15px] resize-none max-h-48"
                        style="min-height: 52px;"
                    ></textarea>

                    <button id="send-btn" disabled class="p-3 m-1 rounded-xl bg-white text-black disabled:opacity-50 disabled:bg-white/10 disabled:text-gray-500 transition-all flex items-center justify-center">
                        <i data-lucide="arrow-up" class="w-5 h-5"></i>
                    </button>
                </div>
                <div class="text-center mt-2 text-xs text-gray-500">
                    AI can make mistakes. Consider verifying important information.
                </div>
            </div>
        </div>
    </main>

    <script>
        // Initialize Icons
        lucide.createIcons();

        // DOM Elements
        const sidebar = document.getElementById('sidebar');
        const openSidebarBtn = document.getElementById('open-sidebar-btn');
        const closeSidebarBtn = document.getElementById('close-sidebar-btn');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        
        // Navigation Elements
        const mainTabs = document.getElementById('main-tabs');
        const studioTabs = document.getElementById('studio-tabs');
        const exitStudioBtn = document.getElementById('exit-studio-btn');
        const studioCta = document.getElementById('studio-cta');

        // Chat Views
        const chatContainer = document.getElementById('chat-container');
        const messagesContainer = document.getElementById('messages');
        const welcomeScreen = document.getElementById('welcome-screen');
        
        // Media Views
        const mediaContainer = document.getElementById('media-container');
        const mediaTitle = document.getElementById('media-title');
        const mediaIcon = document.getElementById('media-icon');
        const backToChatBtn = document.getElementById('back-to-chat-btn');

        let isGenerating = false;
        let currentMode = 'text'; // Track active section

        // Ghost Typing & Dynamic Prompts Data
        const typingPrompts = {
            text: [
                "Explain string theory to a 5 year old", 
                "Write a Python script for a snake game", 
                "Draft a polite email to decline an offer", 
                "What are the best daily habits for focus?"
            ],
            image: [
                "A futuristic city bathed in neon lights", 
                "A cute cat wearing a tiny astronaut suit", 
                "A cyberpunk character portrait in rainy Tokyo", 
                "A serene landscape with a glowing purple river"
            ],
            audio: [
                "An upbeat lofi hip hop track for studying", 
                "A cinematic orchestral battle theme", 
                "A relaxing ambient rain and piano sound", 
                "An 80s synthwave beat with heavy bass"
            ],
            video: [
                "A drone flying over a snowy mountain peak", 
                "A time-lapse of a blooming red rose", 
                "A pixel art animation of a warm campfire", 
                "A slow-motion cinematic shot of coffee splashing"
            ]
        };

        const welcomeExamples = {
            text: [
                { title: "Write a Python script", desc: "for a classic snake game", full: "Write a Python script for a classic snake game" },
                { title: "Explain string theory", desc: "to a 5 year old", full: "Explain string theory to a 5 year old" }
            ],
            image: [
                { title: "A futuristic city", desc: "bathed in neon lights", full: "A futuristic city bathed in neon lights" },
                { title: "A cute cat", desc: "wearing an astronaut suit", full: "A cute cat wearing an astronaut suit" }
            ],
            audio: [
                { title: "Lofi hip hop track", desc: "for studying and relaxing", full: "An upbeat lofi hip hop track for studying" },
                { title: "Cinematic battle theme", desc: "with heavy orchestra", full: "A cinematic orchestral battle theme" }
            ],
            video: [
                { title: "Drone flying over", desc: "a snowy mountain peak", full: "A drone flying over a snowy mountain peak" },
                { title: "Pixel art animation", desc: "of a warm campfire", full: "A pixel art animation of a warm campfire" }
            ]
        };

        let typingTimeout;
        let typePromptIdx = 0;
        let typeCharIdx = 0;
        let isDeletingType = false;

        function startGhostTyping() {
            clearTimeout(typingTimeout);

            if (userInput.value.length > 0 || document.activeElement === userInput) {
                userInput.placeholder = ""; 
                typingTimeout = setTimeout(startGhostTyping, 500); 
                return;
            }

            const currentPrompts = typingPrompts[currentMode];
            const currentText = currentPrompts[typePromptIdx];

            if (isDeletingType) {
                typeCharIdx--;
                userInput.placeholder = currentText.substring(0, typeCharIdx) + '|';

                if (typeCharIdx <= 0) {
                    isDeletingType = false;
                    typePromptIdx = (typePromptIdx + 1) % currentPrompts.length;
                    typingTimeout = setTimeout(startGhostTyping, 600); 
                } else {
                    typingTimeout = setTimeout(startGhostTyping, 25); 
                }
            } else {
                typeCharIdx++;
                userInput.placeholder = currentText.substring(0, typeCharIdx) + '|';

                if (typeCharIdx >= currentText.length) {
                    isDeletingType = true;
                    typingTimeout = setTimeout(startGhostTyping, 2500); 
                } else {
                    typingTimeout = setTimeout(startGhostTyping, 50); 
                }
            }
        }

        function updateWelcomePrompts(mode) {
            const welcomeCards = document.getElementById('welcome-cards');
            if (!welcomeCards) return;
            
            const currentExamples = welcomeExamples[mode];
            welcomeCards.innerHTML = `
                <button class="border border-[#383838] hover:bg-[#2f2f2f] rounded-xl p-4 text-left transition-colors text-sm flex flex-col gap-1" onclick="setInput('${currentExamples[0].full}')">
                    <span class="font-medium text-gray-200">${currentExamples[0].title}</span>
                    <span class="text-gray-500">${currentExamples[0].desc}</span>
                </button>
                <button class="border border-[#383838] hover:bg-[#2f2f2f] rounded-xl p-4 text-left transition-colors text-sm flex flex-col gap-1" onclick="setInput('${currentExamples[1].full}')">
                    <span class="font-medium text-gray-200">${currentExamples[1].title}</span>
                    <span class="text-gray-500">${currentExamples[1].desc}</span>
                </button>
            `;
        }

        window.setMode = function(mode) {
            currentMode = mode;
            
            document.querySelectorAll('.mode-tab').forEach(tab => {
                if(tab.dataset.mode === mode) {
                    tab.classList.remove('bg-transparent', 'text-gray-400');
                    tab.classList.add('bg-[#2f2f2f]', 'text-white');
                } else {
                    tab.classList.remove('bg-[#2f2f2f]', 'text-white');
                    tab.classList.add('bg-transparent', 'text-gray-400');
                }
            });
            
            if (!mediaContainer.classList.contains('hidden')) {
                mediaContainer.classList.add('hidden');
                chatContainer.classList.remove('hidden');
            }
            
            typePromptIdx = 0;
            typeCharIdx = 0;
            isDeletingType = false;
            updateWelcomePrompts(mode);
            startGhostTyping();
            
            userInput.focus();
        };

        // Section Navigation Logic
        window.enterStudioMode = function() {
            // Apply Global Studio Theme (Darker Background, Grids, etc)
            document.body.classList.add('studio-mode');

            mainTabs.classList.add('hidden');
            mainTabs.classList.remove('flex');
            studioTabs.classList.remove('hidden');
            studioTabs.classList.add('flex');
            
            openSidebarBtn.classList.add('hidden');
            exitStudioBtn.classList.remove('hidden');
            studioCta.classList.add('hidden'); 

            messagesContainer.innerHTML = '';
            messagesContainer.classList.add('hidden');
            welcomeScreen.classList.remove('hidden');
            
            setMode('audio');
        };

        exitStudioBtn.addEventListener('click', () => {
            // Remove Global Studio Theme
            document.body.classList.remove('studio-mode');

            studioTabs.classList.add('hidden');
            studioTabs.classList.remove('flex');
            mainTabs.classList.remove('hidden');
            mainTabs.classList.add('flex');
            
            exitStudioBtn.classList.add('hidden');
            openSidebarBtn.classList.remove('hidden');
            studioCta.classList.remove('hidden'); 
            
            messagesContainer.innerHTML = '';
            messagesContainer.classList.add('hidden');
            welcomeScreen.classList.remove('hidden');
            
            setMode('text');
        });

        function toTitleCase(str) {
            return str.toLowerCase().split(' ').map(function(word) {
                return (word.charAt(0).toUpperCase() + word.slice(1));
            }).join(' ');
        }

        window.setInput = function(text) {
            userInput.value = text;
            userInput.focus();
            sendBtn.disabled = false;
            startGhostTyping();
        };

        openSidebarBtn.addEventListener('click', () => {
            sidebar.classList.remove('-translate-x-full');
        });
        closeSidebarBtn.addEventListener('click', () => {
            sidebar.classList.add('-translate-x-full');
        });

        backToChatBtn.addEventListener('click', () => {
            mediaContainer.classList.add('hidden');
            chatContainer.classList.remove('hidden');
            messagesContainer.classList.remove('hidden');
            chatContainer.scrollTop = chatContainer.scrollHeight;
        });

        userInput.addEventListener('focus', () => {
            userInput.placeholder = '';
        });
        
        userInput.addEventListener('blur', () => {
            if (userInput.value === '') startGhostTyping();
        });

        userInput.addEventListener('input', () => {
            sendBtn.disabled = userInput.value.trim() === '' || isGenerating;
            userInput.style.height = 'auto';
            userInput.style.height = (userInput.scrollHeight) + 'px';
        });

        sendBtn.addEventListener('click', () => {
            if(!userInput.value.trim()) return;
            
            const val = userInput.value;
            userInput.value = '';
            userInput.style.height = 'auto';
            sendBtn.disabled = true;
            isGenerating = true;

            welcomeScreen.classList.add('hidden');
            messagesContainer.classList.remove('hidden');
            const userMsg = document.createElement('div');
            userMsg.className = 'flex justify-end';
            userMsg.innerHTML = `<div class="bg-white/10 backdrop-blur-sm border border-white/5 text-white px-5 py-3 rounded-2xl max-w-[80%]">${escapeHTML(val)}</div>`;
            messagesContainer.appendChild(userMsg);
            
            // Add Thinking Indicator
            const thinkingIndicator = document.createElement('div');
            thinkingIndicator.id = 'thinking-indicator';
            thinkingIndicator.className = 'flex gap-4 animate-in fade-in duration-300';
            thinkingIndicator.innerHTML = `
                <div class="w-8 h-8 rounded-full bg-white flex items-center justify-center shrink-0 opacity-70">
                    <i data-lucide="brain" class="w-5 h-5 text-black"></i>
                </div>
                <div class="pt-1 flex items-center">
                    <div class="text-gray-400 text-sm font-medium flex items-center gap-2 bg-white/5 border border-white/10 px-4 py-2 rounded-xl animate-pulse">
                        <i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i>
                        Thinking...
                    </div>
                </div>
            `;
            messagesContainer.appendChild(thinkingIndicator);
            
            chatContainer.scrollTop = chatContainer.scrollHeight;

            const originalBtnHtml = sendBtn.innerHTML;
            sendBtn.innerHTML = '<i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i>';
            lucide.createIcons();
            
            setTimeout(() => {
                isGenerating = false;
                sendBtn.innerHTML = originalBtnHtml;
                
                // Remove Thinking Indicator
                const indicator = document.getElementById('thinking-indicator');
                if (indicator) indicator.remove();
                
                lucide.createIcons();

                if (currentMode === 'audio' || currentMode === 'video') {
                    chatContainer.classList.add('hidden');
                    mediaContainer.classList.remove('hidden');
                    
                    mediaTitle.textContent = toTitleCase(val);
                    const visualizerContainer = document.getElementById('media-visualizer');
                    const iconContainer = document.getElementById('media-icon-container');
                    
                    if (currentMode === 'audio') {
                        iconContainer.className = "w-full max-w-xl aspect-[2.5/1] bg-black/40 rounded-2xl flex flex-col items-center justify-center mb-8 shadow-inner border border-white/5 relative overflow-hidden group";
                        mediaIcon.innerHTML = `
                            <i data-lucide="music" class="w-16 h-16 sm:w-20 sm:h-20 text-purple-400 mb-2"></i>
                            <span class="text-xs font-mono text-purple-400/50 uppercase tracking-[0.2em] border border-purple-500/20 rounded-full px-3 py-1 mt-2">Audio Generation</span>
                        `;
                        let bars = '';
                        for(let i=0; i<40; i++) {
                            let height = 10 + Math.random() * 80;
                            bars += `<div class="w-1.5 sm:w-2 bg-gradient-to-t from-purple-600 to-indigo-400 rounded-t-sm transition-all duration-700" style="height: ${height}%;"></div>`;
                        }
                        visualizerContainer.innerHTML = bars;
                    } else {
                        iconContainer.className = "w-full aspect-video bg-black/60 rounded-2xl flex flex-col items-center justify-center mb-8 shadow-[inset_0_0_50px_rgba(0,0,0,0.8)] border border-white/5 relative overflow-hidden group";
                        mediaIcon.innerHTML = `
                            <i data-lucide="clapperboard" class="w-16 h-16 sm:w-20 sm:h-20 text-indigo-400 mb-2"></i>
                            <span class="text-xs font-mono text-indigo-400/50 uppercase tracking-[0.2em] border border-indigo-500/20 rounded-full px-3 py-1 mt-2">Video Generation</span>
                        `;
                        visualizerContainer.innerHTML = `<div class="absolute inset-0 bg-gradient-to-tr from-indigo-500/10 via-transparent to-purple-500/10"></div>`;
                    }
                    
                    lucide.createIcons();

                    const botMsg = document.createElement('div');
                    botMsg.className = 'flex gap-4';
                    botMsg.innerHTML = `
                        <div class="w-8 h-8 rounded-full bg-white/5 border border-white/10 flex items-center justify-center shrink-0">
                            <i data-lucide="${currentMode === 'audio' ? 'music' : 'video'}" class="w-4 h-4 text-gray-400"></i>
                        </div>
                        <div class="pt-1 text-gray-200">
                            <div class="bg-white/5 border border-white/10 backdrop-blur-sm p-3 rounded-xl flex items-center gap-3 cursor-pointer hover:bg-white/10 transition-colors" onclick="document.getElementById('media-container').classList.remove('hidden'); document.getElementById('chat-container').classList.add('hidden');">
                                <i data-lucide="play-circle" class="w-5 h-5 text-gray-300"></i>
                                <span class="font-medium text-sm">View ${toTitleCase(val)}</span>
                            </div>
                        </div>
                    `;
                    messagesContainer.appendChild(botMsg);
                    lucide.createIcons();

                } else {
                    mediaContainer.classList.add('hidden');
                    chatContainer.classList.remove('hidden');
                    const botMsg = document.createElement('div');
                    botMsg.className = 'flex gap-4';
                    botMsg.innerHTML = `
                        <div class="w-8 h-8 rounded-full bg-white flex items-center justify-center shrink-0">
                            <i data-lucide="brain" class="w-5 h-5 text-black"></i>
                        </div>
                        <div class="pt-1 text-gray-200">
                            <p>This is a simulated response in <b>${currentMode}</b> mode for: "${escapeHTML(val)}"</p>
                        </div>
                    `;
                    messagesContainer.appendChild(botMsg);
                    lucide.createIcons();
                }
                
                chatContainer.scrollTop = chatContainer.scrollHeight;
            }, 30000); 
        });

        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, 
                tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)
            );
        }

        startGhostTyping();
    </script>
</body>
</html>
